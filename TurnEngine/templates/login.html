<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TurnEngine — Player Login</title>

  <meta
    name="description"
    content="TurnEngine competitive turn-based game validator. Login to begin your match."
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <style>

:root{
  --bg:#060810;
  --bg-panel:#0b0f1a;
  --bg-panel2:#0f1420;

  --border:#1a2540;
  --border-glow:#1e3a6e;

  --cyan:#00e5ff;
  --cyan-dim:#0099bb;

  --gold:#ffc400;
  --gold-dim:#a07800;

  --red:#ff3d57;
  --green:#00e676;

  --text:#c8d8f0;
  --text-dim:#4a6080;
  --text-faint:#1e2d45;

  --font-display:'Orbitron', monospace;
  --font-mono:'Share Tech Mono', monospace;

  --glow-cyan:
    0 0 12px rgba(0,229,255,.4),
    0 0 30px rgba(0,229,255,.15);

  --glow-gold:
    0 0 12px rgba(255,196,0,.4),
    0 0 30px rgba(255,196,0,.15);

  --glow-red:
    0 0 12px rgba(255,61,87,.4),
    0 0 30px rgba(255,61,87,.15);
}

/* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:var(--bg);
  overflow:hidden;
  color:var(--text);
  font-family:var(--font-mono);

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;
}

/* BACKGROUND */

.bg-grid{
  position:fixed;
  inset:0;

  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);

  background-size:40px 40px;

  pointer-events:none;
}

.bg-glow{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:.25;
  pointer-events:none;
}

.login-glow-1{
  width:500px;
  height:500px;

  background:
    radial-gradient(circle,
      rgba(0,229,255,.3),
      transparent 70%);

  top:-150px;
  left:-120px;
}

.login-glow-2{
  width:400px;
  height:400px;

  background:
    radial-gradient(circle,
      rgba(255,196,0,.2),
      transparent 70%);

  bottom:-120px;
  right:-80px;
}

.scanline{
  position:fixed;
  inset:0;

  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.06) 2px,
      rgba(0,0,0,.06) 4px
    );

  pointer-events:none;
}

/* WRAPPER */

.login-wrap{
  position:relative;
  z-index:5;

  width:100%;
  max-width:520px;

  padding:30px;
}

/* LOGO */

.login-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;

  margin-bottom:28px;
}

.login-logo-icon{
  font-size:42px;
  color:var(--cyan);

  text-shadow:var(--glow-cyan);

  animation:pulse-icon 3s ease infinite;
}

@keyframes pulse-icon{
  0%,100%{
    opacity:1;
  }

  50%{
    opacity:.5;
  }
}

.login-logo-text{
  display:flex;
  flex-direction:column;
}

.login-brand{
  font-family:var(--font-display);
  font-size:28px;
  font-weight:900;
  letter-spacing:5px;
}

.accent{
  color:var(--cyan);
}

.login-tagline{
  font-size:10px;
  letter-spacing:3px;
  color:var(--text-dim);

  margin-top:4px;
}

/* CARD */

.login-card{
  position:relative;

  background:rgba(11,15,26,.95);

  border:1px solid var(--border-glow);

  border-radius:8px;

  padding:32px;

  overflow:hidden;

  box-shadow:
    0 0 25px rgba(0,229,255,.08),
    inset 0 0 40px rgba(0,229,255,.03);
}

.lc-corner{
  position:absolute;
  width:18px;
  height:18px;
  border-color:var(--cyan);
}

.lc-corner.tl{
  top:10px;
  left:10px;

  border-top:2px solid;
  border-left:2px solid;
}

.lc-corner.tr{
  top:10px;
  right:10px;

  border-top:2px solid;
  border-right:2px solid;
}

.lc-corner.bl{
  bottom:10px;
  left:10px;

  border-bottom:2px solid;
  border-left:2px solid;
}

.lc-corner.br{
  bottom:10px;
  right:10px;

  border-bottom:2px solid;
  border-right:2px solid;
}

/* HEADER */

.login-card-header{
  text-align:center;
  margin-bottom:30px;
}

.lc-badge{
  display:inline-block;

  padding:4px 10px;

  border:1px solid var(--border-glow);

  color:var(--cyan);

  font-size:9px;
  letter-spacing:2px;

  margin-bottom:14px;
}

.lc-title{
  font-family:var(--font-display);

  font-size:22px;

  letter-spacing:4px;

  margin-bottom:8px;
}

.lc-sub{
  color:var(--text-dim);

  font-size:11px;
  letter-spacing:2px;
}

/* FORM */

.login-form{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.lf-field{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.lf-label{
  display:flex;
  align-items:center;
  gap:8px;

  color:var(--text-dim);

  font-size:10px;
  letter-spacing:2px;
}

.lf-marker{
  width:22px;
  height:22px;

  display:flex;
  justify-content:center;
  align-items:center;

  border-radius:50%;

  font-family:var(--font-display);
  font-weight:900;
  font-size:12px;
}

.lf-marker.x{
  border:1px solid var(--cyan);

  background:rgba(0,229,255,.08);

  color:var(--cyan);

  text-shadow:var(--glow-cyan);
}

.lf-marker.o{
  border:1px solid var(--gold);

  background:rgba(255,196,0,.08);

  color:var(--gold);

  text-shadow:var(--glow-gold);
}

/* INPUT */

.lf-input-wrap{
  position:relative;
}

.lf-input{
  width:100%;

  background:var(--bg-panel2);

  border:1px solid var(--border);

  border-radius:4px;

  padding:15px 16px;

  color:var(--text);

  font-size:14px;

  font-family:var(--font-mono);

  outline:none;

  transition:.25s;
}

.lf-input:focus{
  border-color:var(--cyan);

  box-shadow:var(--glow-cyan);
}

.lf-input::placeholder{
  color:var(--text-faint);
}

.lf-field-error .lf-input{
  border-color:var(--red);

  box-shadow:var(--glow-red);
}

/* ERRORS */

.lf-error{
  min-height:12px;

  color:var(--red);

  font-size:10px;

  letter-spacing:1px;
}

.lf-global-error{
  padding:12px;

  border:1px solid rgba(255,61,87,.4);

  background:rgba(255,61,87,.06);

  border-radius:4px;

  text-align:center;

  color:var(--red);

  font-size:11px;
}

.hidden{
  display:none;
}

/* VS */

.lf-vs{
  display:flex;
  align-items:center;
  gap:14px;
}

.lf-vs-line{
  flex:1;
  height:1px;

  background:
    linear-gradient(
      90deg,
      transparent,
      var(--border-glow),
      transparent
    );
}

.lf-vs-badge{
  color:var(--gold);

  font-family:var(--font-display);

  font-size:12px;

  letter-spacing:3px;

  text-shadow:var(--glow-gold);
}

/* BUTTON */

.lf-submit{
  margin-top:10px;

  border:none;

  background:
    linear-gradient(
      90deg,
      rgba(0,229,255,.12),
      rgba(0,229,255,.22)
    );

  border:1px solid var(--cyan);

  color:var(--cyan);

  padding:16px;

  border-radius:5px;

  cursor:pointer;

  font-family:var(--font-display);

  font-size:12px;

  font-weight:700;

  letter-spacing:3px;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;

  transition:.25s;
}

.lf-submit:hover{
  transform:translateY(-2px);

  box-shadow:var(--glow-cyan);
}

.lf-submit:active{
  transform:scale(.98);
}

.lf-submit:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* FOOTER */

.login-footer{
  margin-top:22px;

  text-align:center;

  color:var(--text-faint);

  font-size:10px;

  letter-spacing:2px;
}

/* MOBILE */

@media(max-width:600px){

  .login-wrap{
    padding:20px;
  }

  .login-card{
    padding:24px;
  }

  .login-brand{
    font-size:22px;
  }

  .lc-title{
    font-size:18px;
  }
}

  </style>
</head>

<body>

  <div class="bg-grid"></div>
  <div class="bg-glow login-glow-1"></div>
  <div class="bg-glow login-glow-2"></div>
  <div class="scanline"></div>

  <div class="login-wrap">

    <!-- LOGO -->

    <div class="login-logo">

      <span class="login-logo-icon">⚡</span>

      <div class="login-logo-text">

        <span class="login-brand">
          TURN<span class="accent">ENGINE</span>
        </span>

        <span class="login-tagline">
          COMPETITIVE GAME VALIDATOR
        </span>

      </div>
    </div>

    <!-- CARD -->

    <div class="login-card">

      <span class="lc-corner tl"></span>
      <span class="lc-corner tr"></span>
      <span class="lc-corner bl"></span>
      <span class="lc-corner br"></span>

      <div class="login-card-header">

        <div class="lc-badge">
          MATCH SETUP
        </div>

        <h1 class="lc-title">
          PLAYER REGISTRATION
        </h1>

        <p class="lc-sub">
          Enter player callsigns to initialize match
        </p>

      </div>

      <form class="login-form" id="loginForm">

        <!-- PLAYER 1 -->

        <div class="lf-field" id="field1">

          <label class="lf-label">

            <span class="lf-marker x">X</span>

            PLAYER 1 CALLSIGN

          </label>

          <div class="lf-input-wrap">

            <input
              type="text"
              class="lf-input"
              id="p1Name"
              maxlength="20"
              placeholder="Enter callsign..."
              autocomplete="off"
            />

          </div>

          <span class="lf-error" id="err1"></span>

        </div>

        <!-- VS -->

        <div class="lf-vs">

          <span class="lf-vs-line"></span>

          <span class="lf-vs-badge">
            VS
          </span>

          <span class="lf-vs-line"></span>

        </div>

        <!-- PLAYER 2 -->

        <div class="lf-field" id="field2">

          <label class="lf-label">

            <span class="lf-marker o">O</span>

            PLAYER 2 CALLSIGN

          </label>

          <div class="lf-input-wrap">

            <input
              type="text"
              class="lf-input"
              id="p2Name"
              maxlength="20"
              placeholder="Enter callsign..."
              autocomplete="off"
            />

          </div>

          <span class="lf-error" id="err2"></span>

        </div>

        <!-- GLOBAL ERROR -->

        <div
          class="lf-global-error hidden"
          id="globalErr"
        ></div>

        <!-- BUTTON -->

        <button
          class="lf-submit"
          type="submit"
          id="submitBtn"
        >

          <span class="lf-submit-text">
            INITIALIZE MATCH
          </span>

          <span>
            →
          </span>

        </button>

      </form>

    </div>

    <div class="login-footer">
      DAA · OS CONCEPTS · DYNAMIC PROGRAMMING · SEMAPHORES
    </div>

  </div>

<script>

const form      = document.getElementById('loginForm');
const p1        = document.getElementById('p1Name');
const p2        = document.getElementById('p2Name');

const err1      = document.getElementById('err1');
const err2      = document.getElementById('err2');

const globalErr = document.getElementById('globalErr');

const submitBtn = document.getElementById('submitBtn');

function clearErrors(){

  err1.textContent = '';
  err2.textContent = '';

  globalErr.textContent = '';

  globalErr.classList.add('hidden');

  document
    .getElementById('field1')
    .classList.remove('lf-field-error');

  document
    .getElementById('field2')
    .classList.remove('lf-field-error');
}

function showGlobalError(msg){

  globalErr.textContent = msg;

  globalErr.classList.remove('hidden');
}

form.addEventListener('submit', (e)=>{

  e.preventDefault();

  clearErrors();

  const v1 = p1.value.trim();
  const v2 = p2.value.trim();

  let valid = true;

  if(!v1){

    err1.textContent = 'Callsign required';

    document
      .getElementById('field1')
      .classList.add('lf-field-error');

    valid = false;
  }

  if(!v2){

    err2.textContent = 'Callsign required';

    document
      .getElementById('field2')
      .classList.add('lf-field-error');

    valid = false;
  }

  if(
    v1 &&
    v2 &&
    v1.toLowerCase() === v2.toLowerCase()
  ){

    err2.textContent =
      'Must differ from Player 1';

    document
      .getElementById('field2')
      .classList.add('lf-field-error');

    valid = false;
  }

  if(!valid) return;

  submitBtn.disabled = true;

  submitBtn.querySelector(
    '.lf-submit-text'
  ).textContent = 'INITIALIZING...';

  // STORE PLAYER NAMES

  sessionStorage.setItem('p1Name', v1);
  sessionStorage.setItem('p2Name', v2);

  // REDIRECT

  setTimeout(()=>{

    window.location.href = 'index.html';

  }, 1000);

});

</script>

</body>
</html>
