<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnEngine | Game Validator</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="container">
        <h1>TurnEngine</h1>
        <p class="subtitle">Competitive Turn-Based Game Validator</p>

        <div class="main-layout">
            <!-- Left Side: Game Board -->
            <div class="game-section">
                <div id="board" class="board">
                    <!-- 9 Cells for 3x3 board -->
                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>
                </div>
                
                <div class="controls">
                    <button id="reset-btn">Reset Game</button>
                    <button id="similarity-btn">Check Similarity (DAA)</button>
                    <button id="semaphore-btn">Run Semaphore Demo (OS)</button>
                </div>
            </div>

            <!-- Right Side: Results & Logs -->
            <div class="info-section">
                <div class="card">
                    <h3>DAA Analysis</h3>
                    <p id="lcs-output">Similarity: --%</p>
                    <p id="edit-dist-output">Edit Distance: --</p>
                    <div id="draw-alert" class="alert hidden">Potential Draw Detected!</div>
                </div>

                <div class="card">
                    <h3>OS Sync Logs (Semaphores)</h3>
                    <div id="log-container" class="log-box">
                        <p class="placeholder-text">Click 'Run Semaphore' to see logs...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/script.js"></script>
</body>
</html>
